name: Refresh Dashboard Data

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:     # Manual trigger from Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Refresh Redis cache from Dune API
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
        run: node fetch-dune-data.js

      - name: Fetch data from Redis and update data.json
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          node << 'EOF'
          import { createClient } from 'redis';
          import fs from 'fs';

          const client = createClient({ url: process.env.REDIS_URL });
          await client.connect();

          const [polygon, stellar, solana, tron, updated] = await Promise.all([
            client.get('dashboard:polygon'),
            client.get('dashboard:stellar'),
            client.get('dashboard:solana'),
            client.get('dashboard:tron'),
            client.get('dashboard:updated'),
          ]);

          await client.quit();

          const data = {
            success: true,
            timestamp: updated || new Date().toISOString(),
            data: {
              polygon: polygon || '',
              stellar: stellar || '',
              solana: solana || '',
              tron: tron || '',
            },
          };

          fs.writeFileSync('data.json', JSON.stringify(data));
          console.log(`Updated data.json at ${new Date().toISOString()}`);
          EOF

      - name: Commit and push if changed
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add data.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update dashboard data [skip ci]"
            git push https://${{ secrets.GITHUB_TOKEN_PAT }}@github.com/${{ github.repository }}.git HEAD:main
          else
            echo "No changes to commit"
          fi
