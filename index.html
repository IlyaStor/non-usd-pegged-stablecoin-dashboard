<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Non-USD Stablecoins · On-chain tracker</title>
<meta name="description" content="Live on-chain analytics for non-USD pegged stablecoins across Polygon, Stellar, Solana, Tron and Plasma.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0A0B0F;
  --surface:#11141B;
  --surface-2:#171B23;
  --border:#1F232D;
  --border-strong:#2A2F3B;
  --text:#F3F4F6;
  --text-2:#9CA3AF;
  --text-3:#6B7280;
  --accent:#10B981;
  --accent-2:#34D399;
  --net-polygon:#8247E5;
  --net-stellar:#14B8A6;
  --net-solana:#14F195;
  --net-tron:#FF3232;
  --net-plasma:#00D2FF;
  --net-suspicious:#F87171;
  --net-geography:#60A5FA;
  --grid:#1A1D25;
  --tooltip-bg:#0E1118;
  --tooltip-border:#252934;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
body.light-mode {
  --bg:#FFFFFF;
  --surface:#F9FAFB;
  --surface-2:#F3F4F6;
  --border:#E5E7EB;
  --border-strong:#D1D5DB;
  --text:#111827;
  --text-2:#4B5563;
  --text-3:#9CA3AF;
  --accent:#059669;
  --accent-2:#10B981;
  --grid:#F1F3F6;
  --tooltip-bg:#FFFFFF;
  --tooltip-border:#E5E7EB;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--mono);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  font-size:14px;
  line-height:1.5;
}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

.wrap{max-width:1280px;margin:0 auto;padding:0 24px}

/* ── HEADER ─────────────────────────────────────────── */
.hdr{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:18px 0 16px;border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.hdr-l{display:flex;align-items:center;gap:14px;min-width:0}
.brand{display:flex;align-items:center;gap:10px}
.live-dot{
  width:8px;height:8px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 12px var(--accent),0 0 4px var(--accent);
  animation:pulse 2s ease-in-out infinite;
  flex-shrink:0;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.85)}}
.brand-text{display:flex;flex-direction:column;line-height:1.25}
.brand-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:.03em}
.brand-sub{font-size:10.5px;color:var(--text-3);margin-top:2px;letter-spacing:.04em}

.hero-stats{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.hero-stat{display:flex;flex-direction:column;text-align:right}
.hero-stat-l{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-3);font-weight:500}
.hero-stat-v{font-size:16px;font-weight:700;color:var(--text);margin-top:2px;font-family:var(--mono)}
.hero-stat-d{font-size:9.5px;color:var(--text-3);margin-top:1px}
.hero-stat-d.up{color:var(--accent-2)}
.hero-stat-d.down{color:#F87171}

.theme-btn{
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  padding:7px 12px;font-size:11px;cursor:pointer;font-family:var(--mono);
  border-radius:6px;font-weight:500;transition:all .15s;
}
.theme-btn:hover{background:var(--surface-2);border-color:var(--border-strong)}

/* ── BODY ─────────────────────────────────────────── */
.body{padding:20px 0 40px}
.error{color:#F87171;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);padding:12px 14px;margin-bottom:14px;border-radius:6px;font-size:12px}

/* ── NETWORK TABS ─────────────────────────────────── */
.net-tabs{display:flex;gap:2px;margin-bottom:20px;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:0}
.net-tab{
  position:relative;
  background:transparent;color:var(--text-3);border:none;
  padding:11px 18px 13px;font-size:11.5px;cursor:pointer;
  font-family:var(--mono);font-weight:600;text-transform:uppercase;letter-spacing:.06em;
  transition:color .15s;
}
.net-tab::after{
  content:'';position:absolute;left:8px;right:8px;bottom:-1px;height:2px;
  background:transparent;transition:background .15s,left .15s,right .15s;
  border-radius:2px;
}
.net-tab:hover{color:var(--text-2)}
.net-tab.on{color:var(--text)}
.net-tab.on::after{background:var(--net-color,var(--accent));left:0;right:0}

/* ── KPIS ─────────────────────────────────────────── */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:22px}
.kpi{
  background:var(--surface);border:1px solid var(--border);
  padding:14px 16px 16px;border-radius:8px;position:relative;overflow:hidden;
  transition:border-color .15s,transform .15s;
}
.kpi::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--kpi-c,var(--accent));opacity:.85;
}
.kpi:hover{border-color:var(--border-strong)}
.kpi-l{color:var(--text-3);font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;font-weight:500}
.kpi-v{color:var(--text);font-size:22px;font-weight:700;margin-top:6px;line-height:1.1;font-family:var(--mono);letter-spacing:-.01em}
.kpi-s{color:var(--text-3);font-size:10px;margin-top:4px;line-height:1.4}

/* ── CTRL ─────────────────────────────────────────── */
.ctrl{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.tabs{display:flex;gap:2px;background:var(--surface);padding:3px;border-radius:6px;border:1px solid var(--border)}
.tab{
  background:transparent;color:var(--text-3);border:none;
  padding:6px 14px;font-size:10.5px;cursor:pointer;
  font-family:var(--mono);font-weight:600;text-transform:uppercase;letter-spacing:.06em;
  border-radius:4px;transition:all .15s;
}
.tab.on{background:var(--surface-2);color:var(--text)}
.tab:hover:not(.on){color:var(--text-2)}

.share-btn{
  background:var(--surface);border:1px solid var(--border);color:var(--text-2);
  padding:6px 12px;font-size:10.5px;cursor:pointer;font-family:var(--mono);
  border-radius:6px;font-weight:500;transition:all .15s;
}
.share-btn:hover{color:var(--text);border-color:var(--border-strong)}

/* ── CHIPS ─────────────────────────────────────────── */
.chips{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.chip{
  display:inline-flex;align-items:center;gap:6px;
  background:transparent;border:1px solid var(--border);color:var(--text-3);
  padding:5px 10px;font-size:10.5px;cursor:pointer;font-family:var(--mono);
  font-weight:500;border-radius:14px;transition:all .15s;
}
.chip:hover{border-color:var(--border-strong);color:var(--text-2)}
.chip.on{
  border-color:var(--cc);color:var(--cc);
  background:color-mix(in srgb,var(--cc) 10%,transparent);
}
.chip-d{width:6px;height:6px;border-radius:50%;background:var(--border-strong);transition:background .15s}
.chip.on .chip-d{background:var(--cc)}

/* ── PANEL ─────────────────────────────────────────── */
.panel{background:var(--surface);border:1px solid var(--border);padding:18px;border-radius:8px}
.panel-t{
  font-size:9.5px;color:var(--text-3);margin-bottom:14px;
  text-transform:uppercase;letter-spacing:.1em;font-weight:600;
  display:flex;align-items:center;justify-content:space-between;
}
.panel-t .net-pill{
  padding:2px 8px;font-size:8.5px;font-weight:600;
  border-radius:3px;color:var(--net-color);
  background:color-mix(in srgb,var(--net-color) 12%,transparent);
  letter-spacing:.08em;
}
.chart-wrap{position:relative;height:360px}

/* ── INSIGHTS ─────────────────────────────────────── */
.insights{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;
  margin-top:16px;
}
.insight{
  background:var(--surface);border:1px solid var(--border);
  border-left:3px solid var(--ins-c,var(--accent));
  padding:12px 14px;border-radius:6px;font-size:12px;line-height:1.55;
  color:var(--text-2);
  transition:border-color .15s;
}
.insight:hover{border-color:var(--border-strong);border-left-color:var(--ins-c,var(--accent))}
.insight b{color:var(--text);font-weight:700}
.insight-l{
  font-size:9px;text-transform:uppercase;letter-spacing:.1em;
  color:var(--ins-c,var(--accent));margin-bottom:6px;font-weight:600;display:block;
}

/* ── COLS ─────────────────────────────────────────── */
.cols{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-top:14px}
@media (max-width:920px){.cols{grid-template-columns:1fr}}

table{width:100%;border-collapse:collapse}
th{
  text-align:left;padding:8px 0 10px;font-size:9.5px;color:var(--text-3);
  font-weight:600;border-bottom:1px solid var(--border);
  text-transform:uppercase;letter-spacing:.08em;
}
th.r{text-align:right}
td{padding:9px 0;font-size:11.5px;border-bottom:1px solid var(--border);color:var(--text-2)}
tr:last-child td{border-bottom:none}
td.r{text-align:right;color:var(--text-2);font-variant-numeric:tabular-nums}
td.first{color:var(--text)}

.tk{display:inline-flex;align-items:center;gap:8px}
.tk-d{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.bar-w{
  width:60px;height:4px;background:var(--surface-2);
  border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;
}
.bar-f{height:100%;border-radius:3px;transition:width .4s ease}
.sh{
  font-size:10px;color:var(--text-3);min-width:38px;
  display:inline-block;text-align:right;margin-left:8px;font-variant-numeric:tabular-nums;
}

.pie-wrap{position:relative;height:200px}
.legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:12px}
.leg{display:flex;align-items:center;gap:5px;font-size:10.5px}
.leg-d{width:6px;height:6px;border-radius:50%}
.leg-n{color:var(--text-2)}
.leg-p{color:var(--text-3);font-variant-numeric:tabular-nums}

/* ── GEOGRAPHY ────────────────────────────────────── */
.geo-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:12px;margin-top:14px;
}
.geo-card{
  background:var(--surface);border:1px solid var(--border);
  padding:14px 16px 12px;border-radius:8px;
  transition:border-color .15s,transform .15s;
}
.geo-card:hover{border-color:var(--border-strong)}
.geo-card-h{display:flex;align-items:center;justify-content:space-between;gap:8px}
.geo-flag{font-size:22px;line-height:1}
.geo-cur{
  font-size:9px;font-weight:700;color:var(--text-3);
  background:var(--surface-2);padding:3px 8px;border-radius:3px;letter-spacing:.08em;
}
.geo-name{font-size:11px;color:var(--text-2);margin-top:8px;font-weight:500}
.geo-val{
  font-size:20px;font-weight:700;color:var(--text);margin-top:4px;
  font-family:var(--mono);letter-spacing:-.01em;
}
.geo-sub{font-size:10px;color:var(--text-3);margin-top:2px;font-variant-numeric:tabular-nums}
.geo-spark{margin-top:10px;height:28px}

/* ── SUSPICIOUS ───────────────────────────────────── */
.susp{margin-top:14px}
.susp-item{
  background:var(--surface);border:1px solid var(--border);border-left:3px solid #F87171;
  padding:12px 14px;border-radius:6px;margin-bottom:8px;
}
.susp-h{font-size:12px;color:var(--text);font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.susp-chain{font-size:8.5px;color:var(--text-3);background:var(--surface-2);padding:2px 7px;border-radius:3px;letter-spacing:.08em;text-transform:uppercase}
.susp-r{font-size:10.5px;color:var(--text-3);line-height:1.5}

/* ── FOOTER ───────────────────────────────────────── */
.ftr{
  padding:18px 0 24px;margin-top:32px;border-top:1px solid var(--border);
  display:flex;justify-content:space-between;font-size:11px;color:var(--text-3);
  flex-wrap:wrap;gap:8px;
}
.ftr a{color:var(--text-2);text-decoration:none;transition:color .15s}
.ftr a:hover{color:var(--text)}

/* ── ANIMATIONS ───────────────────────────────────── */
.body > section,.body > div{animation:fadeIn .35s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

</style>

<body>
<div class="wrap">
  <header class="hdr">
    <div class="hdr-l">
      <div class="brand">
        <div class="live-dot"></div>
        <div class="brand-text">
          <span class="brand-title">NON-USD STABLECOINS</span>
          <span class="brand-sub">On-chain tracker · 35 tokens · 16 fiat pegs · 5 chains</span>
        </div>
      </div>
    </div>
    <div class="hero-stats">
      <div class="hero-stat">
        <span class="hero-stat-l">90d Total Volume</span>
        <span class="hero-stat-v" id="heroTotal">—</span>
        <span class="hero-stat-d" id="heroDelta"></span>
      </div>
      <div class="hero-stat">
        <span class="hero-stat-l">Last Updated</span>
        <span class="hero-stat-v" id="heroUpd" style="font-size:13px">—</span>
        <span class="hero-stat-d" id="heroAge"></span>
      </div>
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀ Light</button>
    </div>
  </header>

  <main class="body">
    <div class="error" id="errorBox" style="display:none;"></div>

    <nav class="net-tabs" id="netTabs">
      <button class="net-tab on" data-net="polygon" onclick="switchNetwork('polygon')">Polygon</button>
      <button class="net-tab" data-net="stellar" onclick="switchNetwork('stellar')">Stellar</button>
      <button class="net-tab" data-net="solana" onclick="switchNetwork('solana')">Solana</button>
      <button class="net-tab" data-net="tron" onclick="switchNetwork('tron')">Tron</button>
      <button class="net-tab" data-net="plasma" onclick="switchNetwork('plasma')">Plasma</button>
      <button class="net-tab" data-net="suspicious" onclick="switchNetwork('suspicious')">Suspicious</button>
      <button class="net-tab" data-net="geography" onclick="switchNetwork('geography')">Geography</button>
    </nav>

    <div class="kpis" id="kpis"></div>

    <div class="ctrl" id="ctrl">
      <div class="tabs">
        <button class="tab on" data-m="volume" onclick="setMetric('volume')">Volume (USD)</button>
        <button class="tab" data-m="count" onclick="setMetric('count')">Tx Count</button>
      </div>
      <button class="share-btn" onclick="copyLink()">Share</button>
    </div>

    <div class="chips" id="chips"></div>

    <section class="panel" id="chartPanel">
      <div class="panel-t" id="chartLabel">
        <span>Transfer Volume (USD) — Daily Stacked</span>
        <span class="net-pill" id="netPill"></span>
      </div>
      <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
    </section>

    <section class="insights" id="insights"></section>

    <section class="cols" id="cols">
      <div class="panel">
        <div class="panel-t">Token breakdown</div>
        <table>
          <thead><tr><th>Token</th><th class="r">Volume</th><th class="r">Tx</th><th class="r">Share</th></tr></thead>
          <tbody id="tbl"></tbody>
        </table>
      </div>
      <div class="panel">
        <div class="panel-t">By fiat currency</div>
        <div class="pie-wrap"><canvas id="pieChart"></canvas></div>
        <div class="legend" id="pieLeg"></div>
      </div>
    </section>

    <section class="geo-grid" id="geoGrid" style="display:none"></section>
    <section class="susp" id="suspList" style="display:none"></section>
  </main>

  <footer class="ftr">
    <span>NON-USD STABLECOIN TRACKER · Built by <a href="https://t.me/solosolver" target="_blank">@solosolver</a></span>
    <span>Data from <a href="https://dune.com" target="_blank">Dune Analytics</a> · Refreshed hourly</span>
  </footer>
</div>

// ── FORMATTERS ────────────────────────────────────────────
function fmtMoney(n){
  if(n===null||n===undefined||!isFinite(n))return '0';
  const a=Math.abs(n);
  if(a>=1e9)return (n/1e9).toFixed(2).replace(/\.?0+$/,'')+'B';
  if(a>=1e6)return (n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';
  if(a>=1e3)return (n/1e3).toFixed(1).replace(/\.?0+$/,'')+'K';
  if(a>=1)return n.toFixed(0);
  return n.toFixed(2);
}
function fmtMoneyL(n){return '$'+fmtMoney(n);}
function fmtCount(n){return new Intl.NumberFormat('en-US').format(Math.round(n||0));}
function fmtCompactCount(n){
  const a=Math.abs(n||0);
  if(a>=1e6)return (n/1e6).toFixed(1)+'M';
  if(a>=1e3)return (n/1e3).toFixed(1)+'K';
  return Math.round(n||0).toString();
}
function hexAlpha(hex,a){
  if(!hex||hex[0]!=='#')return hex;
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function relativeTime(iso){
  const t=new Date(iso).getTime();
  if(!t||isNaN(t))return '';
  const s=Math.max(0,Math.round((Date.now()-t)/1000));
  if(s<90)return s+'s ago';
  const m=Math.round(s/60);
  if(m<90)return m+'m ago';
  const h=Math.round(m/60);
  if(h<48)return h+'h ago';
  const d=Math.round(h/24);
  return d+'d ago';
}

// ── DATA LOAD ─────────────────────────────────────────────
async function loadDashboardData(){
  try{
    const res=await fetch('/data.json',{cache:'no-store'});
    if(!res.ok)throw new Error(`Failed: ${res.status}`);
    const json=await res.json();
    if(!json.success)throw new Error(json.error||'Unknown error');
    CHAIN_NETS.forEach(net=>{
      NETWORKS[net].data=json.data[net]||'';
      NETWORKS[net].tm=TOKEN_METADATA;
      NETWORKS[net].cc=CURRENCY_COLORS;
    });
    lastUpdated=json.timestamp;
    updateHeroStats();
    loadNetwork('polygon');
  }catch(err){
    console.error(err);
    const e=document.getElementById('errorBox');
    e.style.display='block';
    e.textContent='Failed to load data: '+err.message;
  }
}

function updateHeroStats(){
  // 90d total across all chain networks + week-over-week delta
  let total=0, prev=0, recent=0;
  CHAIN_NETS.forEach(net=>{
    const rows=parse(NETWORKS[net].data);
    if(!rows.length)return;
    rows.forEach(r=>r.items.forEach(i=>total+=i.v));
    if(rows.length>=14){
      const recentSlice=rows.slice(-7);
      const prevSlice=rows.slice(-14,-7);
      recentSlice.forEach(r=>r.items.forEach(i=>recent+=i.v));
      prevSlice.forEach(r=>r.items.forEach(i=>prev+=i.v));
    }
  });
  document.getElementById('heroTotal').textContent=fmtMoneyL(total);
  if(lastUpdated){
    const d=new Date(lastUpdated);
    document.getElementById('heroUpd').textContent=
      d.toISOString().slice(0,10)+' '+d.toISOString().slice(11,16)+'Z';
    document.getElementById('heroAge').textContent=relativeTime(lastUpdated);
  }
  const deltaEl=document.getElementById('heroDelta');
  if(prev>0){
    const delta=(recent-prev)/prev*100;
    const sign=delta>=0?'▲ +':'▼ ';
    deltaEl.textContent=`${sign}${Math.abs(delta).toFixed(1)}% wow`;
    deltaEl.className='hero-stat-d '+(delta>=0?'up':'down');
  }else{
    deltaEl.textContent='';
  }
}

// ── PARSE ─────────────────────────────────────────────────
function parse(data){
  if(!data)return [];
  const lines=data.trim().split('\n').filter(Boolean);
  const parsed=lines.map(line=>{
    const parts=line.split('|');
    const d=parts[0];
    const items=[];
    for(let i=1;i<parts.length;i+=3){
      const t=parts[i], tx=parseInt(parts[i+1])||0, v=parseFloat(parts[i+2])||0;
      if(t)items.push({t,tx,v});
    }
    return {d,items};
  });
  if(parsed.length>=2 && parsed[0].d>parsed[parsed.length-1].d)parsed.reverse();
  return parsed;
}

  document.querySelectorAll('.net-tab').forEach(b=>b.classList.toggle('on',b.dataset.net===net));

  // Reset visibility
  document.getElementById('ctrl').style.display='flex';

  document.getElementById('cols').style.display='grid';

  if(net==='suspicious'){
    document.getElementById('ctrl').style.display='none';
    document.getElementById('chips').style.display='none';
    document.getElementById('chartPanel').style.display='none';
    document.getElementById('cols').style.display='none';
    document.getElementById('insights').style.display='none';
    document.getElementById('suspList').style.display='block';

    renderKPIs();
    return;
  }

    document.getElementById('chips').style.display='none';
    document.getElementById('chartPanel').style.display='none';
    document.getElementById('cols').style.display='none';
    document.getElementById('insights').style.display='none';
    document.getElementById('geoGrid').style.display='grid';
    renderGeography();
    renderKPIs();
    return;
  }

  selected.clear();
  const {data,tm}=NETWORKS[net];
  parsedRows=parse(data);
  const tokenData={}, currencyData={};
  totalV=0; totalTx=0;
  parsedRows.forEach(({items})=>{
    items.forEach(({t,tx,v})=>{
      if(!tokenData[t])tokenData[t]={v:0,tx:0};
      tokenData[t].v+=v; tokenData[t].tx+=tx;
      totalV+=v; totalTx+=tx;
      const cur=tm[t]?.cur||'OTHER';
      if(!currencyData[cur])currencyData[cur]={v:0,tx:0};
      currencyData[cur].v+=v; currencyData[cur].tx+=tx;
    });
  });
  tokensSorted=Object.entries(tokenData).sort((a,b)=>b[1].v-a[1].v);
  cursSorted=Object.entries(currencyData).sort((a,b)=>b[1].v-a[1].v);

  // Net pill in chart label
  const pill=document.getElementById('netPill');
  pill.textContent=net;
  document.documentElement.style.setProperty('--net-color',NET_COLOR[net]);

  document.getElementById('chartLabel').firstElementChild.textContent=
    metric==='volume'?'Transfer Volume (USD) — Daily Stacked':'Transaction Count — Daily Stacked';

  renderKPIs();
  renderChips();
  renderMainChart();
  renderTable();
  renderPie();
  renderInsights();
}

// ── KPIS ──────────────────────────────────────────────────
function renderKPIs(){
  const kpis=document.getElementById('kpis');
  if(curNet==='suspicious'){
    const rows=NETWORKS.suspicious.rows||[];
    const byChain={};
    rows.forEach(r=>{byChain[r.chain]=(byChain[r.chain]||0)+1;});
    const chains=Object.entries(byChain).sort((a,b)=>b[1]-a[1]);
    kpis.innerHTML=[
      {l:'Suspicious tokens',v:rows.length,s:'flagged',c:NET_COLOR.suspicious},
      {l:'Primary chain',v:chains[0]?chains[0][0]:'—',s:'most affected',c:NET_COLOR.suspicious},
      {l:'Detection method',v:'Null Auth',s:'100% predictive',c:NET_COLOR.suspicious},
    ].map(k=>`<div class="kpi" style="--kpi-c:${k.c}"><div class="kpi-l">${k.l}</div><div class="kpi-v">${k.v}</div><div class="kpi-s">${k.s}</div></div>`).join('');
    return;
  }
  if(curNet==='geography'){
    const geoData={};
    let geoTotal=0;
    CHAIN_NETS.forEach(net=>{
      const rows=parse(NETWORKS[net].data);
      rows.forEach(({items})=>{
        items.forEach(({t,tx,v})=>{
          const cur=TOKEN_METADATA[t]?.cur||'OTHER';
          if(cur!=='OTHER' && GEO_MAP[cur]){
            if(!geoData[cur])geoData[cur]={v:0,tx:0,cur};
            geoData[cur].v+=v; geoData[cur].tx+=tx; geoTotal+=v;
          }
        });
      });
    });
    const top=Object.values(geoData).sort((a,b)=>b.v-a.v).slice(0,4);
    kpis.innerHTML=top.map(({cur,v})=>{
      const geo=GEO_MAP[cur];
      const pct=geoTotal>0?(v/geoTotal*100).toFixed(1):'0';
      return `<div class="kpi" style="--kpi-c:${CURRENCY_COLORS[cur]||NET_COLOR.geography}"><div class="kpi-l">${geo.flag} ${geo.country}</div><div class="kpi-v">${fmtMoneyL(v)}</div><div class="kpi-s">${cur} · ${pct}% of tracked</div></div>`;
    }).join('');
    return;
  }
  // Chain-network KPIs: Total volume + Tx count + Top token + Tokens count
  const accent=NET_COLOR[curNet];
  const topToken=tokensSorted[0];
  const topShare=topToken && totalV>0?(topToken[1].v/totalV*100).toFixed(1):'—';
  const items=[
    {l:'90d Total Volume',v:fmtMoneyL(totalV),s:`${tokensSorted.length} active tokens`,c:accent},
    {l:'90d Transactions',v:fmtCompactCount(totalTx),s:'aggregated daily tx',c:accent},
    {l:'Top token',v:topToken?topToken[0]:'—',s:topToken?`${topShare}% of network`:'no data',c:topToken?TOKEN_METADATA[topToken[0]]?.c||accent:accent},
    {l:'Avg ticket',v:totalTx>0?fmtMoneyL(totalV/totalTx):'—',s:'volume ÷ tx',c:accent},
  ];
  kpis.innerHTML=items.map(k=>`<div class="kpi" style="--kpi-c:${k.c}"><div class="kpi-l">${k.l}</div><div class="kpi-v">${k.v}</div><div class="kpi-s">${k.s}</div></div>`).join('');
}

function renderChips(){
  const chips=document.getElementById('chips');

    const c=TOKEN_METADATA[t]?.c||'#455A64';
    const isOn=selected.has(t)||selected.size===0;

  renderChips();
  renderMainChart();
  renderTable();
}

// ── MAIN CHART ────────────────────────────────────────────
function gradientFill(chart,color){
  const {ctx,chartArea}=chart;
  if(!chartArea)return hexAlpha(color,0.35);
  const g=ctx.createLinearGradient(0,chartArea.top,0,chartArea.bottom);
  g.addColorStop(0,hexAlpha(color,0.65));
  g.addColorStop(1,hexAlpha(color,0.08));
  return g;
}

function renderMainChart(){
  const filter=selected.size===0?tokensSorted.map(([t])=>t):Array.from(selected);
  const rows=parsedRows;
  const dates=rows.map(r=>r.d);
  const datasets=filter.map(token=>{
    const values=rows.map(({items})=>{
      const it=items.find(i=>i.t===token);
      return metric==='volume'?(it?.v||0):(it?.tx||0);
    });
    const color=TOKEN_METADATA[token]?.c||'#455A64';
    return {
      label:token,
      data:values,
      borderColor:color,
      backgroundColor:ctx=>gradientFill(ctx.chart,color),
      fill:true,
      borderWidth:1.4,
      tension:0.32,
      pointRadius:0,
      pointHoverRadius:3.5,
      pointHoverBackgroundColor:color,
      pointHoverBorderColor:'#fff',
      pointHoverBorderWidth:1,
    };
  });

  const ctxEl=document.getElementById('mainChart');
  if(mainChartInstance)mainChartInstance.destroy();
  const isLight=document.body.classList.contains('light-mode');
  const grid=isLight?'#F1F3F6':'#1A1D25';
  const tick=isLight?'#6B7280':'#9CA3AF';
  const tBg=isLight?'#FFFFFF':'#0E1118';
  const tBd=isLight?'#E5E7EB':'#252934';

  const reversed=[...datasets].reverse();
  mainChartInstance=new Chart(ctxEl,{
    type:'line',
    data:{labels:dates,datasets:reversed},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      animation:{duration:400,easing:'easeOutQuart'},
      scales:{
        x:{
          ticks:{font:{size:9,family:"'IBM Plex Mono',monospace"},color:tick,maxTicksLimit:14,autoSkip:true},
          grid:{color:grid,drawBorder:false},
          border:{display:false},
        },
        y:{
          stacked:true,
          ticks:{
            font:{size:9,family:"'IBM Plex Mono',monospace"},color:tick,
            callback:v=>metric==='volume'?'$'+fmtMoney(v):fmtCompactCount(v),
          },
          grid:{color:grid,drawBorder:false},
          border:{display:false},
        }
      },
      plugins:{
        legend:{
          display:true,position:'top',align:'end',
          labels:{
            font:{size:9.5,family:"'IBM Plex Mono',monospace"},
            color:tick,boxWidth:8,boxHeight:8,padding:10,usePointStyle:true,
            pointStyle:'circle',
          },
          reverse:true,
        },
        tooltip:{
          enabled:true,backgroundColor:tBg,borderColor:tBd,borderWidth:1,
          titleColor:isLight?'#111827':'#F3F4F6',
          bodyColor:isLight?'#4B5563':'#9CA3AF',
          footerColor:isLight?'#111827':'#F3F4F6',
          padding:12,displayColors:true,boxPadding:4,
          titleFont:{size:10,family:"'IBM Plex Mono',monospace",weight:'600'},
          bodyFont:{size:10.5,family:"'IBM Plex Mono',monospace"},
          footerFont:{size:10.5,family:"'IBM Plex Mono',monospace",weight:'700'},
          callbacks:{
            title:ctx=>ctx[0].label,
            label:ctx=>{
              const v=ctx.parsed.y;
              const sum=ctx.chart.data.datasets.reduce((s,d)=>s+(d.data[ctx.dataIndex]||0),0);
              const share=sum>0?(v/sum*100).toFixed(1):'0.0';
              if(metric==='volume'){
                return ` ${ctx.dataset.label}: $${fmtMoney(v)} (${share}%)`;
              }
              return ` ${ctx.dataset.label}: ${fmtCompactCount(v)} (${share}%)`;
            },
            footer:items=>{
              const sum=items.reduce((s,c)=>s+c.parsed.y,0);
              return metric==='volume'?`Total: $${fmtMoney(sum)}`:`Total: ${fmtCompactCount(sum)} tx`;
            }
          }
        }
      }
    }
  });
}

// ── INSIGHTS ──────────────────────────────────────────────
function renderInsights(){
  const c=document.getElementById('insights');
  if(!tokensSorted.length){c.innerHTML='';return;}
  const accent=NET_COLOR[curNet];
  const items=[];

  // 1. Concentration
  const [topT,topD]=tokensSorted[0];
  const topShare=totalV>0?(topD.v/totalV*100):0;
  if(topShare>80){
    items.push({
      l:'Market structure',
      t:`<b>${topT}</b> owns <b>${topShare.toFixed(1)}%</b> of ${curNet} volume. Single-token market — competition absent.`,
      c:'#F87171'
    });
  }else if(topShare>50){
    const second=tokensSorted[1];
    const ss=second?(second[1].v/totalV*100).toFixed(1):'0';
    items.push({
      l:'Market structure',
      t:`<b>${topT}</b> dominates with <b>${topShare.toFixed(1)}%</b>${second?`; ${second[0]} second at ${ss}%`:''}.`,
      c:'#FBBF24'
    });
  }else{
    items.push({
      l:'Market structure',
      t:`Fragmented: top token <b>${topT}</b> only <b>${topShare.toFixed(1)}%</b>. ${tokensSorted.length} active tokens, real competition.`,
      c:accent
    });
  }

  // 2. Ticket pattern
  const ticket=topD.tx>0?topD.v/topD.tx:0;
  let pattern,subtext;
  if(ticket>100000){pattern='B2B / treasury';subtext='large institutional transfers, OTC-style flows.';}
  else if(ticket>5000){pattern='DeFi / wholesale';subtext='liquidity ops mixed with corporate flows.';}
  else if(ticket>200){pattern='mixed retail-business';subtext='small business and active users.';}
  else{pattern='retail / remittance';subtext='micropayments and remittance corridor.';}
  items.push({
    l:'Usage pattern',
    t:`Avg ticket of ${topT}: <b>$${fmtMoney(ticket)}</b>. Profile: <b>${pattern}</b> — ${subtext}`,
    c:accent
  });

  // 3. Week-over-week
  if(parsedRows.length>=14){
    let r7=0,p7=0;
    parsedRows.slice(-7).forEach(r=>r.items.forEach(i=>r7+=i.v));
    parsedRows.slice(-14,-7).forEach(r=>r.items.forEach(i=>p7+=i.v));
    if(p7>0){
      const delta=(r7-p7)/p7*100;
      const arrow=delta>=0?'▲':'▼';
      const dir=delta>=0?'up':'down';
      const col=delta>=0?'#34D399':'#F87171';
      items.push({
        l:'Week-over-week',
        t:`Last 7d volume <b style="color:${col}">${arrow} ${Math.abs(delta).toFixed(1)}%</b> vs prior 7d ($${fmtMoney(r7)} vs $${fmtMoney(p7)}). Trend ${dir}.`,
        c:col
      });
    }
  }

  c.innerHTML=items.map(i=>`<div class="insight" style="--ins-c:${i.c}"><span class="insight-l">${i.l}</span>${i.t}</div>`).join('');
}

// ── SUSPICIOUS ────────────────────────────────────────────
function renderSuspicious(){
  const rows=NETWORKS.suspicious.rows||[];
  document.getElementById('suspList').innerHTML=
    rows.map(r=>`<div class="susp-item"><div class="susp-h"><span class="susp-chain">${r.chain}</span> <strong>${r.token}</strong></div><div class="susp-r">${r.reason}</div></div>`).join('');
}

// ── GEOGRAPHY ─────────────────────────────────────────────
function sparkline(values,color){
  if(!values||values.length<2)return '';
  const max=Math.max(...values,1);
  const w=240,h=28;
  const step=w/(values.length-1);
  const pts=values.map((v,i)=>`${(i*step).toFixed(1)},${(h-(v/max)*h*0.85-h*0.075).toFixed(1)}`).join(' ');
  const last=values[values.length-1];
  const lastX=w, lastY=h-(last/max)*h*0.85-h*0.075;
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block;">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
    <circle cx="${lastX-2}" cy="${lastY}" r="2" fill="${color}"/>
  </svg>`;
}

function renderGeography(){
  // Aggregate per currency, daily series for sparkline
  const dailyByCur={};
  const totals={};
  let grand=0;
  CHAIN_NETS.forEach(net=>{
    const rows=parse(NETWORKS[net].data);
    rows.forEach(({d,items})=>{
      items.forEach(({t,tx,v})=>{
        const cur=TOKEN_METADATA[t]?.cur||'OTHER';
        if(cur==='OTHER' || !GEO_MAP[cur])return;
        if(!dailyByCur[cur])dailyByCur[cur]={};
        dailyByCur[cur][d]=(dailyByCur[cur][d]||0)+v;
        if(!totals[cur])totals[cur]={v:0,tx:0};
        totals[cur].v+=v; totals[cur].tx+=tx; grand+=v;
      });
    });
  });
  const sorted=Object.entries(totals).sort((a,b)=>b[1].v-a[1].v);
  const allDates=Array.from(new Set(Object.values(dailyByCur).flatMap(d=>Object.keys(d)))).sort();
  const recent=allDates.slice(-30);

  document.getElementById('geoGrid').innerHTML=sorted.map(([cur,d])=>{
    const geo=GEO_MAP[cur];
    const pct=grand>0?(d.v/grand*100).toFixed(1):'0';
    const color=CURRENCY_COLORS[cur]||'#9CA3AF';
    const series=recent.map(date=>dailyByCur[cur][date]||0);
    return `<div class="geo-card">
      <div class="geo-card-h"><span class="geo-flag">${geo.flag}</span><span class="geo-cur">${cur}</span></div>
      <div class="geo-name">${geo.country}</div>
      <div class="geo-val">${fmtMoneyL(d.v)}</div>
      <div class="geo-sub">${pct}% of tracked · ${fmtCompactCount(d.tx)} tx</div>
      <div class="geo-spark">${sparkline(series,color)}</div>
    </div>`;
  }).join('');
}

// ── SHARE / THEME ─────────────────────────────────────────
function copyLink(){
  try{
    navigator.clipboard.writeText(location.href);
    const btn=event?.target; if(btn){const o=btn.textContent;btn.textContent='Copied';setTimeout(()=>btn.textContent=o,1200);}
  }catch{alert('Link: '+location.href);}
}

function toggleTheme(){
  const light=document.body.classList.toggle('light-mode');
  localStorage.setItem('theme',light?'light':'dark');
  document.getElementById('themeBtn').textContent=light?'◐ Dark':'☀ Light';
  // Re-render chart pieces for new theme
  if(curNet!=='suspicious' && curNet!=='geography'){
    renderMainChart();
    renderPie();
  }
}

const savedTheme=localStorage.getItem('theme');
if(savedTheme==='light'){
  document.body.classList.add('light-mode');
  document.getElementById('themeBtn').textContent='◐ Dark';
}
setNetColorVar('polygon');
loadDashboardData();

// Refresh hero "last updated" relative time every 30s
setInterval(()=>{
  if(lastUpdated){
    document.getElementById('heroAge').textContent=relativeTime(lastUpdated);
  }
},30000);
