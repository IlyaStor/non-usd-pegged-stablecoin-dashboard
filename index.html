<title>Non-USD Stablecoins Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080A0D;color:#E5E7EB;font-family:'IBM Plex Mono',monospace;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#0D0F12}
::-webkit-scrollbar-thumb{background:#2D3139;border-radius:2px}
.wrap{max-width:1200px;margin:0 auto}
.hdr{border-bottom:1px solid #1A1D22;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.hdr-l{display:flex;align-items:center;gap:10px}
.dot{width:7px;height:7px;background:#10B981;border-radius:50%;box-shadow:0 0 8px #10B981}
.hdr-t{font-size:14px;font-weight:600;color:#F9FAFB}
.hdr-s{font-size:10px;color:#374151}
.badge{font-size:9px;color:#374151;padding:3px 8px;border:1px solid #1A1D22}
.body{padding:20px 24px}
.net-tabs{display:flex;gap:0;margin-bottom:16px}
.net-tab{background:#0D0F12;color:#4B5563;border:1px solid #1A1D22;padding:8px 20px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;transition:all 0.15s}
.net-tab:first-child{border-radius:4px 0 0 4px}
.net-tab:last-child{border-radius:0 4px 4px 0}
.net-tab+.net-tab{border-left:none}
.net-tab.on{background:#1A1D22;color:#F9FAFB;border-color:#2D3139}
.kpis{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.kpi{background:#0D0F12;border:1px solid #1A1D22;padding:14px 20px;flex:1;min-width:170}
.kpi-l{color:#4B5563;font-size:10px;text-transform:uppercase;letter-spacing:0.08em}
.kpi-v{color:#E5E7EB;font-size:22px;font-weight:700;margin-top:4px}
.kpi-s{color:#374151;font-size:10px;margin-top:2px}
.ctrl{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.tabs{display:flex;gap:2px}
.tab{background:transparent;color:#4B5563;border:1px solid transparent;padding:5px 14px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;text-transform:uppercase}
.tab.on{background:#1A1D22;color:#F9FAFB;border-color:#2D3139}
.chips{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:5px;background:transparent;border:1px solid #1A1D22;color:#374151;padding:3px 9px;font-size:10px;cursor:pointer;font-family:inherit;font-weight:500}
.chip.on{border-color:var(--cc);color:var(--cc);background:color-mix(in srgb,var(--cc) 8%,transparent)}
.chip-d{width:5px;height:5px;border-radius:50%;background:#2D3139}
.chip.on .chip-d{background:var(--cc)}
.panel{background:#0D0F12;border:1px solid #1A1D22;padding:16px}
.panel-t{font-size:10px;color:#4B5563;margin-bottom:14px;text-transform:uppercase;letter-spacing:0.06em}
.chart-wrap{position:relative;height:360px}
.cols{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap}
.col-l{flex:2;min-width:360px}
.col-r{flex:1;min-width:260px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:5px 0;font-size:10px;color:#4B5563;font-weight:500;border-bottom:1px solid #1A1D22}
th.r{text-align:right}
td{padding:7px 0;font-size:11px;border-bottom:1px solid #0F1114}
td.r{text-align:right;color:#9CA3AF}
.tk{display:inline-flex;align-items:center;gap:6px}
.tk-d{width:5px;height:5px;border-radius:50%}
.bar-w{width:50px;height:3px;background:#1A1D22;border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle}
.bar-f{height:100%;border-radius:2px}
.sh{font-size:10px;color:#4B5563;min-width:32px;display:inline-block;text-align:right;margin-left:6px}
.pie-wrap{position:relative;height:200px}
.legend{display:flex;flex-wrap:wrap;gap:4px 12px;margin-top:8px}
.leg{display:flex;align-items:center;gap:4px;font-size:10px}
.leg-d{width:5px;height:5px;border-radius:50%}
.leg-n{color:#6B7280}
.leg-p{color:#2D3139}
.ftr{padding:12px 24px;border-top:1px solid #1A1D22;display:flex;justify-content:space-between;font-size:9px;color:#1E2328}
</style>
</head>

let curNet='polygon';
let metric='volume';
let raw,tokenMap,curMap,dateMap,tokensSorted,cursSorted,dates,totalV,totalTx,selected;

const fU=v=>v>=1e9?'$'+(v/1e9).toFixed(2)+'B':v>=1e6?'$'+(v/1e6).toFixed(2)+'M':v>=1e3?'$'+(v/1e3).toFixed(1)+'K':'$'+v.toFixed(0);
const fC=v=>v>=1e6?(v/1e6).toFixed(2)+'M':v>=1e3?(v/1e3).toFixed(1)+'K':v.toLocaleString();
const fD=d=>{const p=d.split('-');return['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+p[1]]+' '+parseInt(p[2])};

function parse(dataStr){
  const rows=[];
  dataStr.split('\n').forEach(l=>{const p=l.split('|');const d=p[0];for(let i=1;i+2<p.length;i+=3)rows.push({d,t:p[i],tx:parseInt(p[i+1]),v:parseFloat(p[i+2])});});
  return rows;
}

function loadNetwork(net){
  curNet=net;
  const cfg=NETWORKS[net];
  raw=parse(cfg.data);
  tokenMap={};curMap={};dateMap={};
  raw.forEach(r=>{
    if(!tokenMap[r.t])tokenMap[r.t]={v:0,tx:0};tokenMap[r.t].v+=r.v;tokenMap[r.t].tx+=r.tx;
    const cur=cfg.tm[r.t]?.cur||'Other';if(!curMap[cur])curMap[cur]={v:0,tx:0};curMap[cur].v+=r.v;curMap[cur].tx+=r.tx;
    if(!dateMap[r.d])dateMap[r.d]={v:0,tx:0};dateMap[r.d].v+=r.v;dateMap[r.d].tx+=r.tx;
  });
  tokensSorted=Object.entries(tokenMap).sort((a,b)=>b[1].v-a[1].v);
  cursSorted=Object.entries(curMap).sort((a,b)=>b[1].v-a[1].v);
  dates=Object.keys(dateMap).sort();
  totalV=tokensSorted.reduce((s,[,v])=>s+v.v,0);
  totalTx=tokensSorted.reduce((s,[,v])=>s+v.tx,0);
  selected=tokensSorted.slice(0,6).map(([k])=>k);
}

function switchNetwork(net){
  loadNetwork(net);
  document.querySelectorAll('.net-tab').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===net));
  document.getElementById('netLabel').textContent=net.toUpperCase();
  renderAll();
}

function renderKPIs(){
  document.getElementById('rowBadge').textContent=raw.length+' ROWS';
  document.getElementById('kpis').innerHTML=[
    {l:'TOTAL VOLUME (USD)',val:fU(totalV),s:fD(dates[0])+' — '+fD(dates[dates.length-1])},
    {l:'TOTAL TRANSACTIONS',val:fC(totalTx),s:dates.length+' days'},
    {l:'ACTIVE TOKENS',val:tokensSorted.length,s:cursSorted.length+' fiat pegs'},
    {l:'AVG DAILY VOL',val:fU(totalV/dates.length),s:'per day'}
  ].map(k=>`<div class="kpi"><div class="kpi-l">${k.l}</div><div class="kpi-v">${k.val}</div><div class="kpi-s">${k.s}</div></div>`).join('');
}

function renderChips(){
  const tm=NETWORKS[curNet].tm;
  document.getElementById('chips').innerHTML=tokensSorted.map(([t])=>{
    const on=selected.includes(t);const c=tm[t]?.c||'#455A64';
    return `<button class="chip${on?' on':''}" style="--cc:${c}" onclick="toggleToken('${t}')"><span class="chip-d"></span>${t}</button>`;
  }).join('');
}

function toggleToken(t){
  if(selected.includes(t)){if(selected.length>1)selected=selected.filter(x=>x!==t);}
  else selected.push(t);
  renderChips();renderMainChart();
}

function setMetric(m){
  metric=m;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  document.getElementById('chartLabel').textContent=(m==='volume'?'TRANSFER VOLUME (USD)':'TRANSACTION COUNT')+' — DAILY STACKED';
  renderMainChart();
}

let mainChartInst=null;
function renderMainChart(){
  const ctx=document.getElementById('mainChart');
  const tm=NETWORKS[curNet].tm;
  if(mainChartInst)mainChartInst.destroy();
  const byDate={};
  raw.forEach(r=>{if(!selected.includes(r.t))return;if(!byDate[r.d])byDate[r.d]={};byDate[r.d][r.t]=(byDate[r.d][r.t]||0)+(metric==='volume'?r.v:r.tx);});
  const labels=dates.filter(d=>byDate[d]);
  const datasets=selected.map(t=>{
    const c=tm[t]?.c||'#455A64';
    return{label:t,data:labels.map(d=>byDate[d]?.[t]||0),backgroundColor:c+'40',borderColor:c,borderWidth:1.5,fill:true,pointRadius:0,tension:0.3};
  });
  Chart.defaults.color='#4B5563';Chart.defaults.font.family="'IBM Plex Mono',monospace";Chart.defaults.font.size=10;
  mainChartInst=new Chart(ctx,{type:'line',data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    scales:{
      x:{grid:{color:'#1A1D2233'},ticks:{maxTicksLimit:10,callback:function(v,i){const d=labels[i];return d?fD(d):''}}},
      y:{stacked:true,grid:{color:'#1A1D2233'},ticks:{callback:v=>metric==='volume'?(v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v):(v>=1e3?(v/1e3).toFixed(0)+'K':v)}}
    },
    plugins:{legend:{display:false},tooltip:{backgroundColor:'#0C0E11',borderColor:'#1E2328',borderWidth:1,callbacks:{
      title:items=>{if(!items[0])return'';const d=items[0].label;return fD(d)+', '+d.split('-')[0]},
      label:item=>item.dataset.label+': '+(metric==='volume'?fU(item.raw):fC(item.raw))
    }}}
  }});
}

function renderTable(){
  const tm=NETWORKS[curNet].tm;
  document.getElementById('tbl').innerHTML=tokensSorted.map(([t,d])=>{
    const sh=(d.v/totalV*100).toFixed(1);const c=tm[t]?.c||'#455A64';
    return `<tr><td><span class="tk"><span class="tk-d" style="background:${c}"></span>${t}</span></td><td class="r">${fU(d.v)}</td><td class="r">${fC(d.tx)}</td><td class="r"><span class="bar-w"><span class="bar-f" style="width:${Math.min(+sh,100)}%;background:${c}"></span></span><span class="sh">${sh}%</span></td></tr>`;
  }).join('');
}

let pieInst=null;
function renderPie(){
  const ctx=document.getElementById('pieChart');
  const cc=NETWORKS[curNet].cc;
  if(pieInst)pieInst.destroy();
  const labels=cursSorted.map(([k])=>k);const data=cursSorted.map(([,v])=>v.v);const colors=labels.map(k=>cc[k]||'#455A64');
  pieInst=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderColor:'#080A0D',borderWidth:2}]},options:{
    responsive:true,maintainAspectRatio:false,cutout:'55%',
    plugins:{legend:{display:false},tooltip:{backgroundColor:'#0C0E11',borderColor:'#1E2328',borderWidth:1,callbacks:{label:item=>item.label+': '+fU(item.raw)}}}
  }});
  document.getElementById('pieLeg').innerHTML=cursSorted.map(([k,v])=>{
    const c=cc[k]||'#455A64';
    return `<div class="leg"><span class="leg-d" style="background:${c}"></span><span class="leg-n">${k}</span><span class="leg-p">${(v.v/totalV*100).toFixed(1)}%</span></div>`;
  }).join('');
}

function renderAll(){renderKPIs();renderChips();renderMainChart();renderTable();renderPie();}

loadNetwork('polygon');
renderAll();
</script>
</body>
</html>
