const TM={
  BRLA:{cur:'BRL',c:'#26A69A'},BRZ:{cur:'BRL',c:'#00897B'},BRL1:{cur:'BRL',c:'#004D40'},
  XSGD:{cur:'SGD',c:'#5C6BC0'},COPM:{cur:'COP',c:'#FFA726'},JPYC:{cur:'JPY',c:'#EF5350'},
  IDRT:{cur:'IDR',c:'#78909C'},XIDR:{cur:'IDR',c:'#546E7A'},
  PHT:{cur:'PHP',c:'#AB47BC'},PHPC:{cur:'PHP',c:'#8E24AA'}
};
const CC={BRL:'#26A69A',SGD:'#5C6BC0',COP:'#FFA726',JPY:'#EF5350',IDR:'#78909C',PHP:'#AB47BC'};

function parse(){
  const rows=[];
  R.split('\n').forEach(l=>{const p=l.split('|');const d=p[0];for(let i=1;i+2<p.length;i+=3)rows.push({d,t:p[i],tx:parseInt(p[i+1]),v:parseFloat(p[i+2])});});
  return rows;
}

const raw=parse();
const fU=v=>v>=1e9?'$'+(v/1e9).toFixed(2)+'B':v>=1e6?'$'+(v/1e6).toFixed(2)+'M':v>=1e3?'$'+(v/1e3).toFixed(1)+'K':'$'+v.toFixed(0);
const fC=v=>v>=1e6?(v/1e6).toFixed(2)+'M':v>=1e3?(v/1e3).toFixed(1)+'K':v.toLocaleString();
const fD=d=>{const p=d.split('-');return['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+p[1]]+' '+parseInt(p[2])};

const tokenMap={},curMap={},dateMap={};
raw.forEach(r=>{
  if(!tokenMap[r.t])tokenMap[r.t]={v:0,tx:0};tokenMap[r.t].v+=r.v;tokenMap[r.t].tx+=r.tx;
  const cur=TM[r.t]?.cur||'Other';if(!curMap[cur])curMap[cur]={v:0,tx:0};curMap[cur].v+=r.v;curMap[cur].tx+=r.tx;
  if(!dateMap[r.d])dateMap[r.d]={v:0,tx:0};dateMap[r.d].v+=r.v;dateMap[r.d].tx+=r.tx;
});
const tokensSorted=Object.entries(tokenMap).sort((a,b)=>b[1].v-a[1].v);
const cursSorted=Object.entries(curMap).sort((a,b)=>b[1].v-a[1].v);
const dates=Object.keys(dateMap).sort();
const totalV=tokensSorted.reduce((s,[,v])=>s+v.v,0);
const totalTx=tokensSorted.reduce((s,[,v])=>s+v.tx,0);

let metric='volume';
let selected=tokensSorted.slice(0,6).map(([k])=>k);

function renderKPIs(){
  document.getElementById('rowBadge').textContent=raw.length+' ROWS';
  document.getElementById('kpis').innerHTML=[
    {l:'TOTAL VOLUME (USD)',val:fU(totalV),s:fD(dates[0])+' — '+fD(dates[dates.length-1])},
    {l:'TOTAL TRANSACTIONS',val:fC(totalTx),s:dates.length+' days'},
    {l:'ACTIVE TOKENS',val:tokensSorted.length,s:cursSorted.length+' fiat pegs'},
    {l:'AVG DAILY VOL',val:fU(totalV/dates.length),s:'per day'}
  ].map(k=>`<div class="kpi"><div class="kpi-l">${k.l}</div><div class="kpi-v">${k.val}</div><div class="kpi-s">${k.s}</div></div>`).join('');
}

function renderChips(){
  document.getElementById('chips').innerHTML=tokensSorted.map(([t])=>{
    const on=selected.includes(t);const c=TM[t]?.c||'#455A64';
    return `<button class="chip${on?' on':''}" style="--cc:${c}" onclick="toggleToken('${t}')"><span class="chip-d"></span>${t}</button>`;
  }).join('');
}

function toggleToken(t){
  if(selected.includes(t)){if(selected.length>1)selected=selected.filter(x=>x!==t);}
  else selected.push(t);
  renderChips();renderMainChart();
}

function setMetric(m){
  metric=m;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  document.getElementById('chartLabel').textContent=(m==='volume'?'TRANSFER VOLUME (USD)':'TRANSACTION COUNT')+' — DAILY STACKED';
  renderMainChart();
}

let mainChartInst=null;
function renderMainChart(){
  const ctx=document.getElementById('mainChart');
  if(mainChartInst)mainChartInst.destroy();
  const byDate={};
  raw.forEach(r=>{if(!selected.includes(r.t))return;if(!byDate[r.d])byDate[r.d]={};byDate[r.d][r.t]=(byDate[r.d][r.t]||0)+(metric==='volume'?r.v:r.tx);});
  const labels=dates.filter(d=>byDate[d]);
  const datasets=selected.map(t=>{
    const c=TM[t]?.c||'#455A64';
    return{label:t,data:labels.map(d=>byDate[d]?.[t]||0),backgroundColor:c+'40',borderColor:c,borderWidth:1.5,fill:true,pointRadius:0,tension:0.3};
  });
  Chart.defaults.color='#4B5563';Chart.defaults.font.family="'IBM Plex Mono',monospace";Chart.defaults.font.size=10;
  mainChartInst=new Chart(ctx,{type:'line',data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    scales:{
      x:{grid:{color:'#1A1D2233'},ticks:{maxTicksLimit:10,callback:function(v,i){const d=labels[i];return d?fD(d):''}}},
      y:{stacked:true,grid:{color:'#1A1D2233'},ticks:{callback:v=>metric==='volume'?(v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v):(v>=1e3?(v/1e3).toFixed(0)+'K':v)}}
    },
    plugins:{legend:{display:false},tooltip:{backgroundColor:'#0C0E11',borderColor:'#1E2328',borderWidth:1,callbacks:{
      title:items=>{if(!items[0])return'';const d=items[0].label;return fD(d)+', '+d.split('-')[0]},
      label:item=>item.dataset.label+': '+(metric==='volume'?fU(item.raw):fC(item.raw))
    }}}
  }});
}

function renderTable(){
  document.getElementById('tbl').innerHTML=tokensSorted.map(([t,d])=>{
    const sh=(d.v/totalV*100).toFixed(1);const c=TM[t]?.c||'#455A64';
    return `<tr><td><span class="tk"><span class="tk-d" style="background:${c}"></span>${t}</span></td><td class="r">${fU(d.v)}</td><td class="r">${fC(d.tx)}</td><td class="r"><span class="bar-w"><span class="bar-f" style="width:${Math.min(+sh,100)}%;background:${c}"></span></span><span class="sh">${sh}%</span></td></tr>`;
  }).join('');
}

let pieInst=null;
function renderPie(){
  const ctx=document.getElementById('pieChart');
  if(pieInst)pieInst.destroy();
  const labels=cursSorted.map(([k])=>k);const data=cursSorted.map(([,v])=>v.v);const colors=labels.map(k=>CC[k]||'#455A64');
  pieInst=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderColor:'#080A0D',borderWidth:2}]},options:{
    responsive:true,maintainAspectRatio:false,cutout:'55%',
    plugins:{legend:{display:false},tooltip:{backgroundColor:'#0C0E11',borderColor:'#1E2328',borderWidth:1,callbacks:{label:item=>item.label+': '+fU(item.raw)}}}
  }});
  document.getElementById('pieLeg').innerHTML=cursSorted.map(([k,v])=>{
    const c=CC[k]||'#455A64';
    return `<div class="leg"><span class="leg-d" style="background:${c}"></span><span class="leg-n">${k}</span><span class="leg-p">${(v.v/totalV*100).toFixed(1)}%</span></div>`;
  }).join('');
}

renderKPIs();renderChips();renderMainChart();renderTable();renderPie();
</script>
