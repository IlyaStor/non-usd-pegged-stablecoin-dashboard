<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080A0D;color:#E5E7EB;font-family:'IBM Plex Mono',monospace;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#0D0F12}

.wrap{max-width:1200px;margin:0 auto}
.hdr{border-bottom:1px solid #1A1D22;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}

.dot{width:7px;height:7px;background:#10B981;border-radius:50%;box-shadow:0 0 8px #10B981}

.net-tabs{display:flex;gap:0;margin-bottom:16px}
.net-tab{background:#0D0F12;color:#4B5563;border:1px solid #1A1D22;padding:8px 20px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;transition:all 0.15s}

.ctrl{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.tabs{display:flex;gap:2px}

.chips{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}

.chip.on{border-color:var(--cc);color:var(--cc);background:color-mix(in srgb,var(--cc) 8%,transparent)}
.chip-d{width:5px;height:5px;border-radius:50%;background:#2D3139}
.chip.on .chip-d{background:var(--cc)}
.panel{background:#0D0F12;border:1px solid #1A1D22;padding:16px}
.panel-t{font-size:10px;color:#4B5563;margin-bottom:14px;text-transform:uppercase;letter-spacing:0.06em}
.chart-wrap{position:relative;height:360px}
.cols{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap}
.col-l{flex:2;min-width:360px}
.col-r{flex:1;min-width:260px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:5px 0;font-size:10px;color:#4B5563;font-weight:500;border-bottom:1px solid #1A1D22}
th.r{text-align:right}
td{padding:7px 0;font-size:11px;border-bottom:1px solid #0F1114}
td.r{text-align:right;color:#9CA3AF}
.tk{display:inline-flex;align-items:center;gap:6px}
.tk-d{width:5px;height:5px;border-radius:50%}
.bar-w{width:50px;height:3px;background:#1A1D22;border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle}
.bar-f{height:100%;border-radius:2px}
.sh{font-size:10px;color:#4B5563;min-width:32px;display:inline-block;text-align:right;margin-left:6px}
.pie-wrap{position:relative;height:200px}
.legend{display:flex;flex-wrap:wrap;gap:4px 12px;margin-top:8px}
.leg{display:flex;align-items:center;gap:4px;font-size:10px}
.leg-d{width:5px;height:5px;border-radius:50%}
.leg-n{color:#6B7280}
.leg-p{color:#2D3139}
.ftr{padding:12px 24px;border-top:1px solid #1A1D22;display:flex;justify-content:space-between;font-size:11px;color:#9CA3AF}
.ftr a{color:#9CA3AF;text-decoration:none}
.ftr a:hover{text-decoration:underline}

<script>
// Global state
let NETWORKS = {
  polygon:{data:'',tm:{},cc:{}},
  stellar:{data:'',tm:{},cc:{}},
  solana:{data:'',tm:{},cc:{}},
  suspicious:{
    rows:[
      {chain:'Solana',token:'JPYSC (5 variants)',reason:'Null mint/freeze authorities. News-reactive impersonation of SBI JPYSC (Feb 27, 2026). ~1T supply. 100% predictive scam marker'},
      {chain:'Solana',token:'JPYC (2 variants)',reason:'Unauthorized JPYC on Solana. JPYC Inc. exists only on Ethereum/Polygon/Avalanche. Null authorities, ~1T supply'},
      {chain:'Solana',token:'JPYCI',reason:'Fabricated ticker, no known issuer. Null authorities, ~500B supply'},
      {chain:'Stellar',token:'IDRT',reason:'Unverified issuer on Stellar. Cross-chain mismatch: tracked on Polygon via Dune, appears on Stellar with inconsistent authority'},
      {chain:'Stellar',token:'XSGD',reason:'Unverified issuer on Stellar. Cross-chain mismatch with Polygon data'},
      {chain:'Stellar',token:'RUBX, AUDX, INRX, CNYX, EURX',reason:'Bot spam farm activity. ~70% of low-volume Stellar from 13-15 senders with 15K+ transactions each'}
    ]
  }
};
let curNet = 'polygon';
let metric = 'volume';
let selected = new Set();
let mainChartInst = null, pieInst = null;
let dataCache = {};

// Token metadata mapping
const TOKEN_METADATA = {
  // Polygon tokens
  BRLA:{cur:'BRL',c:'#26A69A',n:'Brazilian Real — BRLA'},
  BRZ:{cur:'BRL',c:'#00897B',n:'Brazilian Real — BRZ'},
  BRL1:{cur:'BRL',c:'#004D40',n:'Brazilian Real — BRL1'},
  XSGD:{cur:'SGD',c:'#5C6BC0',n:'Singapore Dollar — XSGD'},
  COPM:{cur:'COP',c:'#FFA726',n:'Colombian Peso — COPM'},
  JPYC:{cur:'JPY',c:'#EF5350',n:'Japanese Yen — JPYC'},
  IDRT:{cur:'IDR',c:'#78909C',n:'Indonesian Rupiah — IDRT'},
  XIDR:{cur:'IDR',c:'#546E7A',n:'Indonesian Rupiah — XIDR'},
  PHT:{cur:'PHP',c:'#AB47BC',n:'Philippine Peso — PHT'},
  PHPC:{cur:'PHP',c:'#8E24AA',n:'Philippine Peso — PHPC'},
  AUD:{cur:'AUD',c:'#26C6DA',n:'Australian Dollar — AUD'},
  CAD:{cur:'CAD',c:'#8D6E63',n:'Canadian Dollar — CAD'},
  EURe:{cur:'EUR',c:'#42A5F5',n:'Euro — EURe'},
  EURQ:{cur:'EUR',c:'#1E88E5',n:'Euro — EURQ'},
  EUROP:{cur:'EUR',c:'#1565C0',n:'Euro — EUROP'},
  TRYB:{cur:'TRY',c:'#FF7043',n:'Turkish Lira — TRYB'},
  ZARP:{cur:'ZAR',c:'#FFCA28',n:'South African Rand — ZARP'},
  AUDX:{cur:'AUD',c:'#00BCD4',n:'Australian Dollar — AUDX'},
  IDRX:{cur:'IDR',c:'#607D8B',n:'Indonesian Rupiah — IDRX'},
  EURS:{cur:'EUR',c:'#1565C0',n:'Euro — EURS (STASIS)'},
  XZAR:{cur:'ZAR',c:'#FFD54F',n:'South African Rand — XZAR'},
  CADC:{cur:'CAD',c:'#A1887F',n:'Canadian Dollar — CADC'},
  // Stellar tokens
  'EURC (Circle)':{cur:'EUR',c:'#42A5F5',n:'Euro — EURC'},
  AUDD:{cur:'AUD',c:'#26C6DA',n:'Australian Dollar — AUDD'},
  ARS:{cur:'ARS',c:'#9CCC65',n:'Argentine Peso — ARS'},
  GYEN:{cur:'JPY',c:'#EF5350',n:'Japanese Yen — GYEN'},
  NGNC:{cur:'NGN',c:'#29B6F6',n:'Nigerian Naira — NGNC'},
  PEN:{cur:'PEN',c:'#FF7043',n:'Peruvian Peso — PEN'},
  BRLT:{cur:'BRL',c:'#26A69A',n:'Brazilian Real — BRLT'},
  EURS:{cur:'EUR',c:'#1565C0',n:'Euro — EURS'},
  // Solana tokens
  EURC:{cur:'EUR',c:'#42A5F5',n:'Euro — EURC'},
  EUROe:{cur:'EUR',c:'#1565C0',n:'Euro — EUROe'},
  VEUR:{cur:'EUR',c:'#1E88E5',n:'Euro — VEUR'},
  VCHF:{cur:'CHF',c:'#FF6D00',n:'Swiss Franc — VCHF'},
};

// Currency colors
const CURRENCY_COLORS = {
  BRL:'#26A69A',SGD:'#5C6BC0',COP:'#FFA726',JPY:'#EF5350',IDR:'#78909C',
  PHP:'#AB47BC',AUD:'#26C6DA',CAD:'#8D6E63',EUR:'#42A5F5',TRY:'#FF7043',
  ZAR:'#FFCA28',ARS:'#9CCC65',NGN:'#29B6F6',PEN:'#FF7043',CHF:'#FF6D00',
};

// Geography mapping: currency → country/flag
const GEO_MAP = {
  BRL:{country:'Brazil',flag:'🇧🇷',region:'Americas'},
  TRY:{country:'Turkey',flag:'🇹🇷',region:'Europe/Asia'},
  ARS:{country:'Argentina',flag:'🇦🇷',region:'Americas'},
  IDR:{country:'Indonesia',flag:'🇮🇩',region:'Asia'},
  PHP:{country:'Philippines',flag:'🇵🇭',region:'Asia'},
  JPY:{country:'Japan',flag:'🇯🇵',region:'Asia'},
  SGD:{country:'Singapore',flag:'🇸🇬',region:'Asia'},
  EUR:{country:'Europe',flag:'🇪🇺',region:'Europe'},
  CHF:{country:'Switzerland',flag:'🇨🇭',region:'Europe'},
  CAD:{country:'Canada',flag:'🇨🇦',region:'Americas'},
  AUD:{country:'Australia',flag:'🇦🇺',region:'Oceania'},
  ZAR:{country:'South Africa',flag:'🇿🇦',region:'Africa'},
  COP:{country:'Colombia',flag:'🇨🇴',region:'Americas'},
  PEN:{country:'Peru',flag:'🇵🇪',region:'Americas'},
  NGN:{country:'Nigeria',flag:'🇳🇬',region:'Africa'},
};

/**
 * Fetch dashboard data from API
 */
async function loadDashboardData() {
  try {
    document.getElementById('rowBadge').textContent = 'Fetching data...';
    const res = await fetch('/data.json');
    if (!res.ok) throw new Error(`Failed to load data: ${res.status}`);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Unknown error');

    // Build NETWORKS objects
    ['polygon','stellar','solana'].forEach(net => {
      const data = json.data[net];
      NETWORKS[net].data = data;
      NETWORKS[net].tm = buildTokenMetadata(TOKEN_METADATA, net);
      NETWORKS[net].cc = CURRENCY_COLORS;
    });

    const utcTime = new Date(json.timestamp).toUTCString().split(' ').slice(4, 5).join(' ');
    document.getElementById('rowBadge').textContent = `Updated: ${utcTime} UTC`;
    loadNetwork('polygon');
    renderAll();
  } catch (error) {
    console.error('Error loading data:', error);
    document.getElementById('errorBox').style.display = 'block';
    document.getElementById('errorBox').textContent = '❌ Failed to load data: ' + error.message;
  }
}

function buildTokenMetadata(meta, network) {
  const tm = {};
  Object.entries(meta).forEach(([code, obj]) => {
    tm[code] = obj;
  });
  return tm;
}

function parse(data) {
  const lines = data.trim().split('\n');
  const parsed = lines.map(line => {
    const parts = line.split('|');
    const d = parts[0];
    const items = [];
    for(let i=1;i<parts.length;i+=3) {
      items.push({t:parts[i],tx:parseInt(parts[i+1]),v:parseFloat(parts[i+2])});
    }
    return {d,items};
  });
  // Ensure chronological order (oldest first) for left-to-right chart rendering
  if(parsed.length >= 2 && parsed[0].d > parsed[parsed.length-1].d) {
    parsed.reverse();
  }
  return parsed;
}

let tokensSorted, cursSorted, totalV = 0;

function loadNetwork(net) {
  curNet = net;
  document.querySelectorAll('.net-tab').forEach((b,i) => {
    b.classList.toggle('on', ['polygon','stellar','solana','suspicious','geography'][i] === net);
  });
  document.getElementById('netLabel').textContent = net.toUpperCase();

  if(net==='suspicious') {
    selected.clear();
    renderAll();
    return;
  }

  if(net==='geography') {
    selected.clear();
    renderAll();
    return;
  }

  const {data,tm,cc} = NETWORKS[net];
  const rows = parse(data);

  const tokenData = {}, currencyData = {};
  totalV = 0;

  rows.forEach(({items}) => {
    items.forEach(({t,tx,v}) => {
      if(!tokenData[t]) tokenData[t] = {v:0,tx:0};
      tokenData[t].v += v;
      tokenData[t].tx += tx;
      totalV += v;

      const cur = tm[t]?.cur || 'OTHER';
      if(!currencyData[cur]) currencyData[cur] = {v:0,tx:0};
      currencyData[cur].v += v;
      currencyData[cur].tx += tx;
    });
  });

  tokensSorted = Object.entries(tokenData).sort((a,b) => b[1].v - a[1].v);
  cursSorted = Object.entries(currencyData).sort((a,b) => b[1].v - a[1].v);

  renderAll();
}

function switchNetwork(net) {loadNetwork(net);}
function setMetric(m) {metric=m;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.m===m));renderMainChart();}

function renderKPIs(){
  const kpis = document.getElementById('kpis');
  if(curNet==='suspicious') {
    const rows = NETWORKS.suspicious.rows || [];
    const byChain = {};
    rows.forEach(r => {
      if(!byChain[r.chain]) byChain[r.chain] = 0;
      byChain[r.chain]++;
    });
    const chains = Object.entries(byChain).sort((a,b) => b[1] - a[1]);
    kpis.innerHTML = [
      {l:'SUSPICIOUS TOKENS',v:rows.length,s:'detected'},
      {l:'PRIMARY CHAIN',v:chains[0]?chains[0][0]:'—',s:'most affected'},
      {l:'DETECTION METHOD',v:'Null Auth',s:'100% predictive'},
    ].map(k => `<div class="kpi"><div class="kpi-l">${k.l}</div><div class="kpi-v">${k.v}</div><div class="kpi-s">${k.s}</div></div>`).join('');
  } else if(curNet==='geography') {
    // Collect geo data for KPIs
    let geoData = {};
    ['polygon','stellar','solana'].forEach(net => {
      const {data,tm} = NETWORKS[net];
      const rows = parse(data);
      rows.forEach(({items}) => {
        items.forEach(({t,tx,v}) => {
          const cur = tm[t]?.cur || 'OTHER';
          if(cur !== 'OTHER' && GEO_MAP[cur]) {
            if(!geoData[cur]) geoData[cur] = {v:0,tx:0,cur};
            geoData[cur].v += v;
            geoData[cur].tx += tx;
          }
        });
      });
    });
    const geoSorted = Object.values(geoData).sort((a,b) => b.v - a.v).slice(0,4);
    kpis.innerHTML = geoSorted.map(({cur,v}) => {
      const geo = GEO_MAP[cur];
      return `<div class="kpi"><div class="kpi-l">${geo.flag} ${cur}</div><div class="kpi-v">$${(v/1e6).toFixed(1)}M</div><div class="kpi-s">${geo.country}</div></div>`;
    }).join('');
  } else {
    const topTokens = tokensSorted.slice(0, Math.min(4, tokensSorted.length));
    kpis.innerHTML = topTokens.map(([t, d]) => {
      const val = metric==='volume' ? `$${(d.v/1e6).toFixed(1)}M` : fC(d.tx);
      return `<div class="kpi"><div class="kpi-l">${t}</div><div class="kpi-v">${val}</div><div class="kpi-s">${metric==='volume' ? 'Volume (7d)' : 'Transactions'}</div></div>`;
    }).join('');
  }
}

function fU(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);}
function fC(n){return new Intl.NumberFormat('en-US').format(n);}

function renderChips(){
  const chips = document.getElementById('chips');
  if(curNet==='suspicious' || curNet==='geography') {
    chips.innerHTML = '';
    document.querySelector('.ctrl').style.display = 'none';
    return;
  }
  document.querySelector('.ctrl').style.display = 'flex';
  chips.innerHTML = tokensSorted.map(([t]) => {
    const tm = NETWORKS[curNet].tm;
    const c = tm[t]?.c || '#455A64';
    const isOn = selected.has(t) || selected.size === 0;
    return `<button class="chip ${isOn?'on':''}" style="--cc:${c}" onclick="toggleToken('${t}')" title="${tm[t]?.n||t}"><span class="chip-d"></span>${t}</button>`;
  }).join('');
}

function toggleToken(t) {
  if(selected.has(t)) selected.delete(t);
  else selected.add(t);
  if(selected.size === tokensSorted.length) selected.clear();
  renderChips();
  renderMainChart();
  renderTable();
}

let mainChartInstance = null;
function renderMainChart(){
  const chart = document.getElementById('mainChart');
  const chartLabel = document.getElementById('chartLabel');
  const chartPanel = document.querySelector('.panel');
  if(curNet==='suspicious' || curNet==='geography') {
    chartPanel.style.display='none';
    return;
  }
  chartPanel.style.display='block';
  chart.style.display='block';
  chartLabel.style.display='block';
  const {data,tm} = NETWORKS[curNet];
  const rows = parse(data);
  const filter = selected.size===0 ? tokensSorted.map(([t])=>t) : Array.from(selected);

  const dates = rows.map(r=>r.d);
  const datasets = filter.map(token => {
    const values = rows.map(({items}) => {
      const item = items.find(i=>i.t===token);
      return metric==='volume' ? (item?.v||0) : (item?.tx||0);
    });
    return {
      label:token,
      data:values,
      borderColor:tm[token]?.c||'#455A64',
      backgroundColor:tm[token]?.c||'#455A64',
      fill:true,
      borderWidth:1,
      tension:0.3,
    };
  });

  const ctx = document.getElementById('mainChart');
  if(mainChartInstance) mainChartInstance.destroy();
  const isLight = document.body.classList.contains('light-mode');
  const gridColor = isLight ? '#E5E7EB' : '#1A1D22';
  const tickColor = isLight ? '#6B7280' : '#9CA3AF';
  const tooltipBg = isLight ? '#FFFFFF' : '#0C0E11';
  const tooltipBorder = isLight ? '#E5E7EB' : '#1E2328';
  // Reverse datasets for correct stacking order
  const reversedDatasets = [...datasets].reverse();
  mainChartInstance = new Chart(ctx, {
    type:'line',
    data:{labels:dates,datasets:reversedDatasets},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{
        x:{display:true,ticks:{font:{size:8},color:tickColor},grid:{color:gridColor}},
        y:{stacked:true,ticks:{font:{size:8},color:tickColor},grid:{color:gridColor}}
      },
      plugins:{
        legend:{display:true,labels:{font:{size:9},color:tickColor},reverse:true},
        tooltip:{
          enabled:true,
          backgroundColor:tooltipBg,
          borderColor:tooltipBorder,
          borderWidth:1,
          titleColor:tickColor,
          bodyColor:tickColor,
          padding:10,
          displayColors:true,
          callbacks:{
            title:context=>{
              return context[0].label;
            },
            label:context=>{
              const value = context.parsed.y;
              const label = context.dataset.label;
              if(metric==='volume') {
                const formatted = value >= 1e6 ? (value/1e6).toFixed(2) + 'M' : (value/1e3).toFixed(1) + 'K';
                return `${label}: $${formatted}`;
              } else {
                return `${label}: ${Math.round(value).toLocaleString()}`;
              }
            }
          }
        }
      }
    }
  });
}

function renderTable(){
  const colsElem = document.querySelector('.cols');
  if(curNet==='suspicious') {
    colsElem.style.display='none';
    colsElem.style.visibility='hidden';
    colsElem.style.height='0';
    colsElem.style.margin='0';
    const rows = NETWORKS.suspicious.rows || [];
    let suspiciousList = document.getElementById('suspiciousList');
    if(!suspiciousList) {
      suspiciousList = document.createElement('div');
      suspiciousList.id = 'suspiciousList';
      suspiciousList.className = 'panel';
      suspiciousList.style.marginTop = '16px';
      document.querySelector('.body').appendChild(suspiciousList);
    }
    suspiciousList.style.display='block';
    suspiciousList.style.visibility='visible';
    const isLight = document.body.classList.contains('light-mode');
    const borderColor = isLight ? '#E5E7EB' : '#0F1114';
    const textColor = isLight ? '#6B7280' : '#9CA3AF';
    suspiciousList.innerHTML = `<div class="panel-t">SUSPICIOUS TOKENS</div><div>${rows.map(r => `<div style="padding:10px 0;border-bottom:1px solid ${borderColor};"><div style="font-weight:600;margin-bottom:4px;"><span style="color:#FF6B6B">●</span> <strong>${r.chain}: ${r.token}</strong></div><div style="font-size:10px;color:${textColor};line-height:1.5;">${r.reason}</div></div>`).join('')}</div>`;
    return;
  }
  colsElem.style.display='flex';
  colsElem.style.visibility='visible';
  colsElem.style.height='auto';
  colsElem.style.margin='';
  const suspiciousList = document.getElementById('suspiciousList');
  if(suspiciousList) suspiciousList.style.display='none';
  const tm = NETWORKS[curNet].tm;
  document.getElementById('tbl').innerHTML = tokensSorted.map(([t,d]) => {
    const sh = (d.v/totalV*100).toFixed(1);
    const c = tm[t]?.c || '#455A64';
    const nm = tm[t]?.n || t;
    return `<tr><td><span class="tk"><span class="tk-d" style="background:${c}"></span>${nm}</span></td><td class="r">${metric==='volume'?fU(d.v):fC(d.tx)}</td><td class="r">${fC(d.tx)}</td><td class="r"><span class="bar-w"><span class="bar-f" style="width:${Math.min(+sh,100)}%;background:${c}"></span></span><span class="sh">${sh}%</span></td></tr>`;
  }).join('');
}

function renderPie(){
  if(curNet==='suspicious' || curNet==='geography') {
    if(pieInst) pieInst.destroy();
    document.getElementById('pieChart').style.display='none';
    document.getElementById('pieLeg').innerHTML='';
    return;
  }
  document.getElementById('pieChart').style.display='block';
  const cc = NETWORKS[curNet].cc;
  if(pieInst) pieInst.destroy();
  const labels = cursSorted.map(([k]) => k);
  const data = cursSorted.map(([,v]) => v.v);
  const colors = labels.map(k => cc[k] || '#455A64');
  const isLight = document.body.classList.contains('light-mode');
  const pieBorderColor = isLight ? '#FFFFFF' : '#080A0D';
  const tooltipBg = isLight ? '#FFFFFF' : '#0C0E11';
  const tooltipBorder = isLight ? '#E5E7EB' : '#1E2328';
  pieInst = new Chart(document.getElementById('pieChart'), {
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderColor:pieBorderColor,borderWidth:2}]},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      cutout:'55%',
      plugins:{
        legend:{display:false},
        tooltip:{backgroundColor:tooltipBg,borderColor:tooltipBorder,borderWidth:1}
      }
    }
  });
  document.getElementById('pieLeg').innerHTML = cursSorted.map(([k,v]) => {
    const c = cc[k] || '#455A64';
    return `<div class="leg"><span class="leg-d" style="background:${c}"></span><span class="leg-n">${k}</span><span class="leg-p">${(v.v/totalV*100).toFixed(1)}%</span></div>`;
  }).join('');
}

function renderGeo(){
  if(curNet!=='geography') {
    const geoPanel = document.getElementById('geoPanel');
    if(geoPanel) geoPanel.style.display='none';
    return;
  }

  // Collect all data from all networks
  let geoData = {};
  ['polygon','stellar','solana'].forEach(net => {
    const {data,tm} = NETWORKS[net];
    const rows = parse(data);
    rows.forEach(({items}) => {
      items.forEach(({t,tx,v}) => {
        const cur = tm[t]?.cur || 'OTHER';
        if(cur !== 'OTHER' && GEO_MAP[cur]) {
          if(!geoData[cur]) geoData[cur] = {v:0,tx:0,cur};
          geoData[cur].v += v;
          geoData[cur].tx += tx;
        }
      });
    });
  });

  const geoSorted = Object.values(geoData).sort((a,b) => b.v - a.v);

  let geoPanel = document.getElementById('geoPanel');
  if(!geoPanel) {
    geoPanel = document.createElement('div');
    geoPanel.id = 'geoPanel';
    geoPanel.className = 'panel';
    geoPanel.style.marginTop = '16px';
    document.querySelector('.body').appendChild(geoPanel);
  }

  const isLight = document.body.classList.contains('light-mode');
  const borderColor = isLight ? '#E5E7EB' : '#0F1114';
  const textColor = isLight ? '#6B7280' : '#9CA3AF';
  const headerColor = isLight ? '#111827' : '#E5E7EB';

  geoPanel.style.display='block';
  geoPanel.innerHTML = `
    <div class="panel-t">STABLECOIN ACTIVITY BY COUNTRY</div>
    <table style="width:100%;border-collapse:collapse;">
      <thead>
        <tr style="border-bottom:1px solid ${borderColor};">
          <th style="text-align:left;padding:8px 0;font-size:10px;color:${textColor};font-weight:500;">COUNTRY</th>
          <th style="text-align:right;padding:8px 0;font-size:10px;color:${textColor};font-weight:500;">VOLUME</th>
          <th style="text-align:right;padding:8px 0;font-size:10px;color:${textColor};font-weight:500;">TX</th>
        </tr>
      </thead>
      <tbody>
        ${geoSorted.map(({cur,v,tx}) => {
          const geo = GEO_MAP[cur];
          const pct = (v/totalV*100).toFixed(1);
          return `<tr style="border-bottom:1px solid ${borderColor};">
            <td style="padding:8px 0;font-size:11px;color:${headerColor};">${geo.flag} ${geo.country}</td>
            <td style="text-align:right;padding:8px 0;font-size:11px;color:${headerColor};">$${(v/1e6).toFixed(1)}M <span style="font-size:9px;color:${textColor};">(${pct}%)</span></td>
            <td style="text-align:right;padding:8px 0;font-size:11px;color:${textColor};">${(tx/1e3).toFixed(0)}K</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

function renderAll(){renderKPIs();renderChips();renderMainChart();renderTable();renderPie();renderGeo();}

  navigator.clipboard.writeText('https://analytics.solosolver.xyz');
  alert('Link copied to clipboard!');
}

function toggleTheme() {
  const isCurrentlyLight = document.body.classList.contains('light-mode');
  if(isCurrentlyLight) {
    document.body.classList.remove('light-mode');
    localStorage.setItem('theme', 'dark');
    document.getElementById('themeBtn').textContent = '☀️ Light';
  } else {
    document.body.classList.add('light-mode');
    localStorage.setItem('theme', 'light');
    document.getElementById('themeBtn').textContent = '🌙 Dark';
  }
  // Re-render charts with updated theme colors
  updateChartTheme();
}

function updateChartTheme() {
  const isLight = document.body.classList.contains('light-mode');
  const gridColor = isLight ? '#E5E7EB' : '#1A1D22';
  const tickColor = isLight ? '#6B7280' : '#9CA3AF';
  const tooltipBg = isLight ? '#FFFFFF' : '#0C0E11';
  const tooltipBorder = isLight ? '#E5E7EB' : '#1E2328';
  const pieBorderColor = isLight ? '#FFFFFF' : '#080A0D';

  if(mainChartInstance) {
    mainChartInstance.options.scales.x.ticks.color = tickColor;
    mainChartInstance.options.scales.y.ticks.color = tickColor;
    mainChartInstance.options.scales.x.grid = {color: gridColor};
    mainChartInstance.options.scales.y.grid = {color: gridColor};
    mainChartInstance.options.plugins.tooltip.backgroundColor = tooltipBg;
    mainChartInstance.options.plugins.tooltip.borderColor = tooltipBorder;
    mainChartInstance.options.plugins.legend.labels.color = tickColor;
    mainChartInstance.update();
  }
  if(pieInst) {
    pieInst.data.datasets[0].borderColor = pieBorderColor;
    pieInst.options.plugins.tooltip.backgroundColor = tooltipBg;
    pieInst.options.plugins.tooltip.borderColor = tooltipBorder;
    pieInst.update();
  }
}

// Load saved theme on page load
const savedTheme = localStorage.getItem('theme');
if(savedTheme === 'light') {
  document.body.classList.add('light-mode');
  document.getElementById('themeBtn').textContent = '🌙 Dark';
}

// Initialize on page load
loadDashboardData();
